<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廣告收益報告 7/16</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
  background: #0a0e1a;
  color: #e0e6f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px 48px;
}
.container { max-width: 420px; width: 100%; }
.header { text-align: center; margin-bottom: 28px; }
.header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: .04em; margin-bottom: 6px; }
.header .period { font-size: 0.82rem; color: #556; letter-spacing: .06em; }
.kpi {
  background: #111827;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 28px 20px;
  text-align: center;
}
.kpi .label { font-size: 0.72rem; color: #4a6080; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.kpi .value { font-size: 2.4rem; font-weight: 800; color: #f5c842; }
.kpi .sub { font-size: 0.78rem; color: #334155; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 廣告收益報告</h1>
    <div class="period">2026年 7月 16日</div>
  </div>

  <div class="kpi">
    <div class="label">當日收益</div>
    <div class="value">$217</div>
    <div class="sub">TWD</div>
  </div>
</div>
</body>
</html>
