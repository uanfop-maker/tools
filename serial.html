<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流水編號產生器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0b1220;
  color: #e8dcc8;
  min-height: 100vh;
  padding: 24px 16px 40px;
}
.page-title {
  text-align: center;
  font-size: 0.9rem;
  font-weight: 700;
  color: #c9a84c;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #c9a84c2a;
  position: relative;
}
.color-palette-btn {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid #c9a84c44;
  border-radius: 8px;
  color: #c9a84c88;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px 10px;
  line-height: 1;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.color-palette-btn:hover { background: #c9a84c18; color: #c9a84c; border-color: #c9a84c77; }
.groups {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
}
@media (max-width: 900px) { .groups { grid-template-columns: 1fr; } }
@media (min-width: 901px) and (max-width: 1100px) { .groups { grid-template-columns: repeat(2, 1fr); } }
.group {
  background: #111c30;
  border: 1px solid #c9a84c22;
  border-radius: 14px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: background 0.3s;
}
.group-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.7rem;
  color: #c9a84caa;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding-bottom: 10px;
  border-bottom: 1px solid #c9a84c18;
}
.group-title-text { flex: 1; text-align: center; }
.remove-btn {
  background: none;
  border: 1px solid transparent;
  border-radius: 5px;
  color: #c9a84c33;
  cursor: pointer;
  font-size: 0.75rem;
  padding: 2px 6px;
  line-height: 1;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.remove-btn:hover { color: #e05252; border-color: #e0525244; background: #3a1010; }
.field-label {
  font-size: 0.65rem;
  color: #c9a84c77;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
input[type="text"], textarea {
  background: #0b1220;
  border: 1px solid #c9a84c33;
  border-radius: 8px;
  color: #e8dcc8;
  font-family: 'SF Mono', 'Fira Code', monospace;
  padding: 10px 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
}
input[type="text"]:focus, textarea:focus { border-color: #c9a84c; }
input[type="text"]::placeholder, textarea::placeholder { color: #c9a84c2e; }
textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.5;
  font-size: 0.88rem;
}
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.copy-btn {
  background: linear-gradient(150deg, #a87828 0%, #d4af37 40%, #c9a84c 65%, #8b6610 100%);
  border: none;
  border-radius: 11px;
  color: #0b1220;
  cursor: pointer;
  padding: 16px 10px 14px;
  transition: opacity 0.15s, transform 0.1s;
  text-align: center;
  box-shadow: 0 3px 16px #c9a84c18;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.copy-btn:hover { opacity: 0.93; }
.copy-btn:active { transform: scale(0.97); opacity: 0.85; }
.copy-btn .btn-label {
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #0b122099;
  font-weight: 700;
}
.copy-btn .btn-val {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  line-height: 1.1;
  word-break: break-all;
  color: #0b1220;
}
.copy-btn .btn-val.small { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em; opacity: 0.8; white-space: pre-wrap; text-align: left; }
.copy-btn.dim { background: linear-gradient(150deg, #7a5a18 0%, #9a7a2a 50%, #7a5a18 100%); }
.copy-btn.dim .btn-val { color: #0b122077; }
.hist-wrap { flex: 1; }
.hist-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.hist-label { font-size: 0.65rem; color: #c9a84c77; letter-spacing: 0.12em; text-transform: uppercase; }
.row-btns { display: flex; gap: 5px; }
.ghost-btn {
  background: none;
  border: 1px solid #c9a84c33;
  border-radius: 5px;
  color: #c9a84c88;
  cursor: pointer;
  font-size: 0.65rem;
  padding: 3px 9px;
  letter-spacing: 0.04em;
  transition: background 0.2s, color 0.2s;
}
.ghost-btn:hover { background: #c9a84c18; color: #c9a84c; }
.ghost-btn.undo { border-color: #c9a84c55; color: #c9a84cbb; }
.divider { height: 1px; background: linear-gradient(90deg, transparent, #c9a84c1a, transparent); margin-bottom: 10px; }
.hist-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
.hist-list::-webkit-scrollbar { width: 3px; }
.hist-list::-webkit-scrollbar-track { background: transparent; }
.hist-list::-webkit-scrollbar-thumb { background: #c9a84c33; border-radius: 2px; }
.hist-item {
  background: #0b1220;
  border: 1px solid #c9a84c14;
  border-radius: 7px;
  padding: 8px 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.hist-info { flex: 1; min-width: 0; }
.hist-code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.82rem;
  color: #c9a84c;
  font-weight: 600;
  word-break: break-all;
  white-space: pre-wrap;
  line-height: 1.4;
}
.hist-time { font-size: 0.62rem; color: #556688; margin-top: 2px; }
.x-btn {
  background: none;
  border: none;
  color: #33446688;
  cursor: pointer;
  font-size: 0.78rem;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  transition: color 0.2s, background 0.2s;
  line-height: 1;
  margin-top: 1px;
}
.x-btn:hover { color: #c9a84c; background: #c9a84c18; }
.hist-empty { text-align: center; color: #33446688; padding: 20px 0; font-size: 0.78rem; }
.add-row {
  max-width: 1200px;
  margin: 16px auto 0;
  text-align: center;
}
.add-btn {
  background: none;
  border: 1px solid #c9a84c44;
  border-radius: 9px;
  color: #c9a84c99;
  cursor: pointer;
  font-size: 0.82rem;
  padding: 9px 28px;
  letter-spacing: 0.08em;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.add-btn:hover { background: #c9a84c18; color: #c9a84c; border-color: #c9a84c77; }
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: linear-gradient(135deg, #a87828, #d4af37);
  color: #0b1220;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 0.85rem;
  font-weight: 700;
  opacity: 0;
  transition: transform 0.28s, opacity 0.28s;
  pointer-events: none;
  z-index: 999;
  letter-spacing: 0.04em;
  max-width: 88vw;
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Color Picker Modal ───────────────────────────────────────── */
.cpk-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.cpk-overlay.open { display: flex; }
.cpk-modal {
  background: #111c30;
  border: 1px solid #c9a84c33;
  border-radius: 18px;
  padding: 24px 24px 20px;
  width: 360px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.cpk-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.cpk-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: #c9a84c;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.cpk-close {
  background: none;
  border: none;
  color: #c9a84c66;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0 4px;
  transition: color 0.2s;
}
.cpk-close:hover { color: #c9a84c; }

/* Group tabs */
.cpk-group-label {
  font-size: 0.62rem;
  color: #c9a84c77;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cpk-group-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.cpk-tab {
  background: #0b1220;
  border: 1px solid #c9a84c33;
  border-radius: 7px;
  color: #c9a84c88;
  cursor: pointer;
  font-size: 0.72rem;
  padding: 6px 14px;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.cpk-tab.active { border-color: #c9a84c; background: #c9a84c22; color: #c9a84c; }
.cpk-tab:hover:not(.active) { background: #c9a84c14; color: #c9a84cbb; }

/* Color swatches */
.cpk-swatch-label {
  font-size: 0.62rem;
  color: #c9a84c77;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.cpk-swatches {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.cpk-swatch {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
}
.cpk-swatch:hover { transform: scale(1.12); }
.cpk-swatch.selected { border-color: #c9a84c; box-shadow: 0 0 0 3px #c9a84c44; }
/* Conic gradient color wheel swatch */
.cpk-wheel {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: conic-gradient(
    hsl(0,90%,50%), hsl(30,90%,50%), hsl(60,90%,50%), hsl(90,90%,50%),
    hsl(120,90%,50%), hsl(150,90%,50%), hsl(180,90%,50%), hsl(210,90%,50%),
    hsl(240,90%,50%), hsl(270,90%,50%), hsl(300,90%,50%), hsl(330,90%,50%),
    hsl(360,90%,50%)
  );
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.cpk-wheel::after {
  content: '';
  position: absolute;
  inset: 28%;
  border-radius: 50%;
  background: #111c30;
}
.cpk-wheel:hover { transform: scale(1.12); }
.cpk-wheel.selected { border-color: #c9a84c; box-shadow: 0 0 0 3px #c9a84c44; }
/* Hidden native color input inside wheel */
.cpk-wheel input[type="color"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
  border: none;
  padding: 0;
}

/* Sliders */
.cpk-slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.cpk-slider-name {
  font-size: 0.65rem;
  color: #c9a84c88;
  letter-spacing: 0.06em;
  width: 36px;
  flex-shrink: 0;
}
.cpk-slider-wrap { flex: 1; position: relative; }
.cpk-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}
.cpk-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #c9a84c;
  border: 2px solid #0b1220;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.cpk-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #c9a84c;
  border: 2px solid #0b1220;
  cursor: pointer;
}
.cpk-slider-val {
  font-size: 0.68rem;
  color: #c9a84c88;
  width: 32px;
  text-align: right;
  flex-shrink: 0;
}

/* Preview */
.cpk-preview-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0 20px;
}
.cpk-preview-label { font-size: 0.62rem; color: #c9a84c77; letter-spacing: 0.1em; text-transform: uppercase; }
.cpk-preview-box {
  flex: 1;
  height: 32px;
  border-radius: 8px;
  border: 1px solid #c9a84c22;
  transition: background 0.2s;
}

/* Buttons */
.cpk-btn-row {
  display: flex;
  gap: 10px;
}
.cpk-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  transition: opacity 0.15s;
}
.cpk-btn:hover { opacity: 0.87; }
.cpk-btn.cancel { background: #1e2e46; color: #c9a84c88; border: 1px solid #c9a84c33; }
.cpk-btn.confirm { background: linear-gradient(135deg, #a87828, #d4af37); color: #0b1220; }
</style>
</head>
<body>

<div class="page-title">
  ⚜ 流水編號產生器
  <button class="color-palette-btn" title="自訂組背景顏色" onclick="openColorPicker()">🎨</button>
</div>
<div class="groups" id="groups"></div>
<div class="add-row">
  <button class="add-btn" onclick="addGroup()">＋ 新增組</button>
</div>
<div class="toast" id="toast"></div>

<!-- Color Picker Modal -->
<div class="cpk-overlay" id="cpkOverlay" onclick="cpkOverlayClick(event)">
  <div class="cpk-modal" id="cpkModal">
    <div class="cpk-header">
      <span class="cpk-title">🎨 自訂組背景顏色</span>
      <button class="cpk-close" onclick="closeColorPicker()">✕</button>
    </div>

    <div class="cpk-group-label">選擇組別</div>
    <div class="cpk-group-tabs" id="cpkTabs"></div>

    <div class="cpk-swatch-label">顏色</div>
    <div class="cpk-swatches" id="cpkSwatches">
      <!-- 5 presets + 1 wheel, built by JS -->
    </div>

    <div class="cpk-slider-row">
      <span class="cpk-slider-name">亮度</span>
      <div class="cpk-slider-wrap">
        <input class="cpk-slider" type="range" id="cpkLight" min="5" max="40" value="14">
      </div>
      <span class="cpk-slider-val" id="cpkLightVal">14%</span>
    </div>
    <div class="cpk-slider-row">
      <span class="cpk-slider-name">飽和度</span>
      <div class="cpk-slider-wrap">
        <input class="cpk-slider" type="range" id="cpkSat" min="0" max="80" value="40">
      </div>
      <span class="cpk-slider-val" id="cpkSatVal">40%</span>
    </div>

    <div class="cpk-preview-row">
      <span class="cpk-preview-label">預覽</span>
      <div class="cpk-preview-box" id="cpkPreview"></div>
    </div>

    <div class="cpk-btn-row">
      <button class="cpk-btn cancel" onclick="closeColorPicker()">取消</button>
      <button class="cpk-btn confirm" onclick="confirmColor()">確定</button>
    </div>
  </div>
</div>

<script>
const STORE_KEY  = id => `serial_v2_g${id}`;
const STORE_IDS  = 'serial_v2_groupIds';
const STORE_CTR  = 'serial_v2_idCounter';
const STORE_CLR  = id => `serial_v2_color_${id}`;

// 5 preset hues (same S=40%, L=14%, different hue)
const PRESET_HUES = [213, 160, 270, 30, 340];

function splitSerial(s) {
  const m = String(s).match(/^(.*?)(\d+)$/);
  if (!m) return null;
  return { prefix: m[1], numStr: m[2], num: parseInt(m[2], 10), width: m[2].length };
}
function incrementSerial(s) {
  const p = splitSerial(s);
  if (!p) return s;
  return p.prefix + String(p.num + 1).padStart(p.width, '0');
}
function applyTemplate(num, tpl) {
  if (!tpl.trim()) return '';
  return tpl.replace(/\{n\}/g, num);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function nowStr() {
  return new Date().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Group color management ─────────────────────────────────────────
function defaultGroupColor() { return { h: 213, s: 40, l: 14 }; }

function loadGroupColor(id) {
  try {
    const v = JSON.parse(localStorage.getItem(STORE_CLR(id)));
    if (v && typeof v.h === 'number') return v;
  } catch {}
  return null;
}
function saveGroupColor(id, hsl) {
  localStorage.setItem(STORE_CLR(id), JSON.stringify(hsl));
}
function applyGroupColor(id) {
  const el = document.getElementById(`g${id}`);
  if (!el) return;
  const c = loadGroupColor(id);
  el.style.background = c ? `hsl(${c.h},${c.s}%,${c.l}%)` : '';
}
function hslToCss(h, s, l) { return `hsl(${h},${s}%,${l}%)`; }

// ── Color Picker state ─────────────────────────────────────────────
let cpkActiveId = null;
let cpkWorkH = 213, cpkWorkS = 40, cpkWorkL = 14;
let cpkUsePreset = 0; // index 0-4 = preset, 5 = wheel

function openColorPicker() {
  cpkActiveId = groupIds[0] ?? null;
  buildCpkTabs();
  selectCpkGroup(cpkActiveId);
  document.getElementById('cpkOverlay').classList.add('open');
}
function closeColorPicker() {
  document.getElementById('cpkOverlay').classList.remove('open');
}
function cpkOverlayClick(e) {
  if (e.target === document.getElementById('cpkOverlay')) closeColorPicker();
}
function confirmColor() {
  if (cpkActiveId !== null) {
    saveGroupColor(cpkActiveId, { h: cpkWorkH, s: cpkWorkS, l: cpkWorkL });
    applyGroupColor(cpkActiveId);
  }
  closeColorPicker();
}

function buildCpkTabs() {
  const tabs = document.getElementById('cpkTabs');
  tabs.innerHTML = '';
  groupIds.forEach((id, i) => {
    const btn = document.createElement('button');
    btn.className = 'cpk-tab';
    btn.textContent = `組 ${i + 1}`;
    btn.addEventListener('click', () => selectCpkGroup(id));
    btn.id = `cpkTab-${id}`;
    tabs.appendChild(btn);
  });
}
function buildCpkSwatches() {
  const wrap = document.getElementById('cpkSwatches');
  wrap.innerHTML = '';
  // 5 presets
  PRESET_HUES.forEach((hue, i) => {
    const div = document.createElement('div');
    div.className = 'cpk-swatch';
    div.style.background = `hsl(${hue}, 40%, 14%)`;
    div.title = `色調 ${hue}°`;
    div.dataset.idx = i;
    div.addEventListener('click', () => selectPreset(i));
    div.id = `cpkSwatchP${i}`;
    wrap.appendChild(div);
  });
  // Color wheel (native input)
  const wheel = document.createElement('div');
  wheel.className = 'cpk-wheel';
  wheel.id = 'cpkWheel';
  wheel.title = '自選顏色';
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.id = 'cpkColorInput';
  inp.addEventListener('input', onWheelColor);
  wheel.appendChild(inp);
  wheel.addEventListener('click', () => { inp.click(); });
  wrap.appendChild(wheel);
}
function selectPreset(i) {
  cpkUsePreset = i;
  cpkWorkH = PRESET_HUES[i];
  updateSwatchSelection();
  updatePreview();
}
function onWheelColor(e) {
  cpkUsePreset = 5;
  const hex = e.target.value;
  // Extract hue from hex
  cpkWorkH = hexToHue(hex);
  updateSwatchSelection();
  updatePreview();
}
function hexToHue(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  if (d === 0) return 0;
  let h;
  if (max === r) h = ((g-b)/d + 6) % 6;
  else if (max === g) h = (b-r)/d + 2;
  else h = (r-g)/d + 4;
  return Math.round(h * 60);
}
function updateSwatchSelection() {
  PRESET_HUES.forEach((_, i) => {
    const el = document.getElementById(`cpkSwatchP${i}`);
    if (el) el.classList.toggle('selected', cpkUsePreset === i);
  });
  const wheel = document.getElementById('cpkWheel');
  if (wheel) wheel.classList.toggle('selected', cpkUsePreset === 5);
}
function updatePreview() {
  const preview = document.getElementById('cpkPreview');
  if (preview) preview.style.background = hslToCss(cpkWorkH, cpkWorkS, cpkWorkL);
}
function updateSliderGradients() {
  const lightSlider = document.getElementById('cpkLight');
  const satSlider = document.getElementById('cpkSat');
  if (lightSlider) {
    lightSlider.style.background = `linear-gradient(to right, hsl(${cpkWorkH},${cpkWorkS}%,5%), hsl(${cpkWorkH},${cpkWorkS}%,40%))`;
  }
  if (satSlider) {
    satSlider.style.background = `linear-gradient(to right, hsl(${cpkWorkH},0%,${cpkWorkL}%), hsl(${cpkWorkH},80%,${cpkWorkL}%))`;
  }
}

function selectCpkGroup(id) {
  cpkActiveId = id;
  // Update tabs
  groupIds.forEach(gid => {
    const t = document.getElementById(`cpkTab-${gid}`);
    if (t) t.classList.toggle('active', gid === id);
  });
  // Load current color for this group
  const c = loadGroupColor(id) || defaultGroupColor();
  cpkWorkH = c.h; cpkWorkS = c.s; cpkWorkL = c.l;
  // Sync sliders
  document.getElementById('cpkLight').value = cpkWorkL;
  document.getElementById('cpkSat').value = cpkWorkS;
  document.getElementById('cpkLightVal').textContent = cpkWorkL + '%';
  document.getElementById('cpkSatVal').textContent = cpkWorkS + '%';
  // Determine preset
  const pi = PRESET_HUES.indexOf(cpkWorkH);
  cpkUsePreset = pi >= 0 ? pi : 5;
  buildCpkSwatches();
  updateSwatchSelection();
  updatePreview();
  updateSliderGradients();
}

// Slider events
document.addEventListener('DOMContentLoaded', () => {
  const ls = document.getElementById('cpkLight');
  const ss = document.getElementById('cpkSat');
  ls.addEventListener('input', () => {
    cpkWorkL = parseInt(ls.value);
    document.getElementById('cpkLightVal').textContent = cpkWorkL + '%';
    updatePreview();
    updateSliderGradients();
  });
  ss.addEventListener('input', () => {
    cpkWorkS = parseInt(ss.value);
    document.getElementById('cpkSatVal').textContent = cpkWorkS + '%';
    updatePreview();
    updateSliderGradients();
  });
});

// ── Group ID management ───────────────────────────────────────────
let groupIds = (() => {
  try { const v = JSON.parse(localStorage.getItem(STORE_IDS)); if (Array.isArray(v) && v.length) return v; } catch {}
  return [0, 1, 2];
})();
let idCounter = (() => {
  try { const v = parseInt(localStorage.getItem(STORE_CTR)); if (!isNaN(v)) return v; } catch {}
  return 3;
})();

function saveGroupLayout() {
  localStorage.setItem(STORE_IDS, JSON.stringify(groupIds));
  localStorage.setItem(STORE_CTR, String(idCounter));
}

const states = {};

function loadState(id) {
  try {
    const s = localStorage.getItem(STORE_KEY(id));
    if (s) return JSON.parse(s);
  } catch {}
  return { number: '', template: '', history: [], lastDeleted: null };
}
function saveState(id) {
  const s = { ...states[id] };
  delete s.lastDeleted;
  localStorage.setItem(STORE_KEY(id), JSON.stringify(s));
}

function refreshGroupNumbers() {
  groupIds.forEach((id, idx) => {
    const el = document.querySelector(`#g${id} .group-title-text`);
    if (el) el.textContent = `⚜ 組 ${idx + 1}`;
  });
  const canRemove = groupIds.length > 1;
  groupIds.forEach(id => {
    const btn = document.getElementById(`rbtn-${id}`);
    if (btn) btn.style.visibility = canRemove ? 'visible' : 'hidden';
  });
}

function buildGroup(id) {
  if (!states[id]) states[id] = loadState(id);
  const st = states[id];
  const gNum = groupIds.indexOf(id) + 1;
  const div = document.createElement('div');
  div.className = 'group';
  div.id = `g${id}`;
  div.innerHTML = `
    <div class="group-title">
      <span style="width:20px"></span>
      <span class="group-title-text">⚜ 組 ${gNum}</span>
      <button class="remove-btn" id="rbtn-${id}" title="移除此組" onclick="removeGroup(${id})">✕</button>
    </div>
    <div>
      <div class="field-label">當前編號（英數字，數字結尾）</div>
      <input type="text" id="num-${id}" placeholder="例：AA090801" spellcheck="false" autocomplete="off" value="${esc(st.number)}">
    </div>
    <div>
      <div class="field-label">模板字串（選填） — 用 {n} 代表編號</div>
      <textarea id="tpl-${id}" placeholder="例：訂單-{n}-確認&#10;可多行輸入">${esc(st.template)}</textarea>
    </div>
    <div class="btn-row">
      <button class="copy-btn" id="nbtn-${id}">
        <div class="btn-label">複製編號</div>
        <div class="btn-val" id="nval-${id}">---</div>
      </button>
      <button class="copy-btn" id="sbtn-${id}">
        <div class="btn-label">複製字串</div>
        <div class="btn-val small" id="sval-${id}">---</div>
      </button>
    </div>
    <div class="hist-wrap">
      <div class="hist-header">
        <div class="hist-label">點擊歷史</div>
        <div class="row-btns">
          <button class="ghost-btn undo" id="undo-${id}" style="display:none" onclick="undoDel(${id})">↩ 恢復</button>
          <button class="ghost-btn" onclick="exportCSV(${id})">匯出 CSV</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="hist-list" id="hlist-${id}"></div>
      <div class="hist-empty" id="hempty-${id}">尚無紀錄</div>
    </div>
  `;
  document.getElementById('groups').appendChild(div);
  applyGroupColor(id);
  document.getElementById(`num-${id}`).addEventListener('input', () => {
    states[id].number = document.getElementById(`num-${id}`).value;
    updateBtns(id); saveState(id);
  });
  document.getElementById(`tpl-${id}`).addEventListener('input', () => {
    states[id].template = document.getElementById(`tpl-${id}`).value;
    updateBtns(id); saveState(id);
  });
  document.getElementById(`nbtn-${id}`).addEventListener('click', () => handleCopy(id, 'num'));
  document.getElementById(`sbtn-${id}`).addEventListener('click', () => handleCopy(id, 'str'));
  document.getElementById(`num-${id}`).addEventListener('keydown', e => { if (e.key === 'Enter') handleCopy(id, 'num'); });
  updateBtns(id);
  renderHistory(id);
}

function addGroup() {
  const id = idCounter++;
  groupIds.push(id);
  saveGroupLayout();
  buildGroup(id);
  refreshGroupNumbers();
  showToast(`已新增組 ${groupIds.length}`);
}
function removeGroup(id) {
  if (groupIds.length <= 1) return;
  const idx = groupIds.indexOf(id);
  if (idx === -1) return;
  groupIds.splice(idx, 1);
  saveGroupLayout();
  document.getElementById(`g${id}`)?.remove();
  refreshGroupNumbers();
  showToast('已移除');
}

function updateBtns(id) {
  const st = states[id];
  const num = st.number.trim();
  const str = applyTemplate(num, st.template);
  document.getElementById(`nval-${id}`).textContent = num || '---';
  document.getElementById(`nval-${id}`).className = 'btn-val';
  const sval = document.getElementById(`sval-${id}`);
  const sbtn = document.getElementById(`sbtn-${id}`);
  if (str) {
    sval.textContent = str; sval.className = 'btn-val small'; sbtn.classList.remove('dim');
  } else {
    sval.textContent = st.template.trim() ? '（請填入編號）' : '（未填模板）';
    sval.className = 'btn-val small'; sbtn.classList.add('dim');
  }
}

function handleCopy(id, type) {
  const st = states[id];
  const num = st.number.trim();
  if (!num) { showToast('請先輸入編號'); return; }
  if (!splitSerial(num)) { showToast('編號必須以數字結尾'); return; }
  let copyText;
  if (type === 'num') {
    copyText = num;
  } else {
    copyText = applyTemplate(num, st.template);
    if (!copyText) { showToast('請先填入模板字串'); return; }
  }
  navigator.clipboard.writeText(copyText)
    .then(() => showToast('已複製：' + (copyText.length > 30 ? copyText.slice(0,30)+'…' : copyText)))
    .catch(() => showToast('複製失敗'));
  st.history.push({ display: copyText, number: num, type, time: nowStr() });
  const next = incrementSerial(num);
  st.number = next;
  document.getElementById(`num-${id}`).value = next;
  updateBtns(id); renderHistory(id); saveState(id);
}

function renderHistory(id) {
  const st = states[id];
  const list  = document.getElementById(`hlist-${id}`);
  const empty = document.getElementById(`hempty-${id}`);
  empty.style.display = st.history.length ? 'none' : 'block';
  list.innerHTML = '';
  [...st.history].reverse().forEach((item, ri) => {
    const idx = st.history.length - 1 - ri;
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.innerHTML = `
      <div class="hist-info">
        <div class="hist-code">${esc(item.display)}</div>
        <div class="hist-time">${esc(item.time)}</div>
      </div>
      <button class="x-btn" title="刪除">✕</button>`;
    div.querySelector('.x-btn').addEventListener('click', () => delHistory(id, idx));
    list.appendChild(div);
  });
}

function delHistory(id, idx) {
  const st = states[id];
  st.lastDeleted = { item: st.history[idx], idx };
  st.history.splice(idx, 1);
  document.getElementById(`undo-${id}`).style.display = '';
  renderHistory(id); saveState(id);
}
function undoDel(id) {
  const st = states[id];
  if (!st.lastDeleted) return;
  st.history.splice(st.lastDeleted.idx, 0, st.lastDeleted.item);
  st.lastDeleted = null;
  document.getElementById(`undo-${id}`).style.display = 'none';
  renderHistory(id); saveState(id);
}
function exportCSV(id) {
  const st = states[id];
  if (!st.history.length) { showToast('沒有紀錄可匯出'); return; }
  const rows = [['時間','類型','複製內容','當時編號']];
  st.history.forEach(h => rows.push([h.time, h.type === 'num' ? '編號' : '字串', h.display, h.number]));
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `serial_g${groupIds.indexOf(id)+1}_history.csv`;
  a.click();
}

groupIds.forEach(id => buildGroup(id));
refreshGroupNumbers();
</script>
</body>
</html>
