<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2FA 驗證碼</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 600;
    color: #a78bfa;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  .add-form {
    background: #1a1a24;
    border: 1px solid #2e2e40;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .add-form input {
    background: #0f0f13;
    border: 1px solid #2e2e40;
    border-radius: 8px;
    color: #e8e8f0;
    font-size: 0.95rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-form input:focus { border-color: #7c3aed; }
  .add-form input::placeholder { color: #555570; }
  .add-form button {
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 10px;
    transition: background 0.2s;
  }
  .add-form button:hover { background: #6d28d9; }
  .entries { display: flex; flex-direction: column; gap: 12px; }
  .entry {
    background: #1a1a24;
    border: 1px solid #2e2e40;
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .entry:hover { border-color: #7c3aed44; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name {
    font-size: 0.85rem;
    color: #8888a8;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #e8e8f0;
    line-height: 1;
  }
  .entry-code.expiring { color: #f87171; }
  .timer-ring {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle.bg { fill: none; stroke: #2e2e40; stroke-width: 4; }
  .timer-ring circle.fg {
    fill: none;
    stroke: #7c3aed;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
  }
  .timer-ring circle.fg.expiring { stroke: #f87171; }
  .timer-text {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.75rem;
    color: #8888a8;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: #555570;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .delete-btn:hover { color: #f87171; background: #f8717120; }
  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #7c3aed;
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 0.9rem;
    font-weight: 600;
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    pointer-events: none;
  }
  .copy-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .empty {
    text-align: center;
    color: #555570;
    padding: 40px 0;
    font-size: 0.9rem;
  }
  @media (max-width: 480px) {
    .entry-code { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<h1>🔐 2FA 驗證碼</h1>

<div class="add-form">
  <input id="inp-name" type="text" placeholder="帳號名稱（例：Google）" maxlength="40">
  <input id="inp-secret" type="text" placeholder="Secret Key（base32）" maxlength="200" autocomplete="off" spellcheck="false">
  <button id="btn-add">+ 新增</button>
</div>

<div class="entries" id="entries"></div>
<div class="empty" id="empty" style="display:none">尚未新增任何帳號</div>

<div class="copy-toast" id="toast">已複製！</div>

<script>
// ── TOTP core ──────────────────────────────────────────────────────────────
const B32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

function base32Decode(s) {
  s = s.toUpperCase().replace(/\s/g, '').replace(/=+$/, '');
  let bits = 0, val = 0;
  const out = [];
  for (const c of s) {
    const idx = B32.indexOf(c);
    if (idx < 0) continue;
    val = (val << 5) | idx;
    bits += 5;
    if (bits >= 8) { out.push((val >>> (bits - 8)) & 0xff); bits -= 8; }
  }
  return new Uint8Array(out);
}

async function hmacSha1(keyBytes, data) {
  const key = await crypto.subtle.importKey('raw', keyBytes,
    { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
  return new Uint8Array(await crypto.subtle.sign('HMAC', key, data));
}

function numTo8Bytes(n) {
  const buf = new Uint8Array(8);
  let tmp = BigInt(n);
  for (let i = 7; i >= 0; i--) { buf[i] = Number(tmp & 0xffn); tmp >>= 8n; }
  return buf;
}

async function totp(secret, digits = 6, period = 30) {
  const t = Math.floor(Date.now() / 1000 / period);
  const key = base32Decode(secret);
  const mac = await hmacSha1(key, numTo8Bytes(t));
  const offset = mac[mac.length - 1] & 0x0f;
  const code = ((mac[offset] & 0x7f) << 24) | (mac[offset+1] << 16) | (mac[offset+2] << 8) | mac[offset+3];
  return String(code % Math.pow(10, digits)).padStart(digits, '0');
}

// ── Storage ────────────────────────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem('2fa_entries') || '[]'); }
  catch { return []; }
}
function save(entries) { localStorage.setItem('2fa_entries', JSON.stringify(entries)); }

// ── State ──────────────────────────────────────────────────────────────────
let entries = load();
let codes = {};  // id → code string

// ── UI helpers ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function formatCode(code) {
  // Insert space in middle: 123 456
  return code.slice(0, 3) + ' ' + code.slice(3);
}

function render() {
  const el = document.getElementById('entries');
  const emptyEl = document.getElementById('empty');
  emptyEl.style.display = entries.length ? 'none' : 'block';
  el.innerHTML = '';
  for (const e of entries) {
    const div = document.createElement('div');
    div.className = 'entry';
    div.dataset.id = e.id;
    div.innerHTML = `
      <div class="timer-ring" id="ring-${e.id}">
        <svg viewBox="0 0 44 44">
          <circle class="bg" cx="22" cy="22" r="18"/>
          <circle class="fg" id="arc-${e.id}" cx="22" cy="22" r="18"
            stroke-dasharray="113.1" stroke-dashoffset="0"/>
        </svg>
      </div>
      <div class="entry-info">
        <div class="entry-name">${escHtml(e.name)}</div>
        <div class="entry-code" id="code-${e.id}">------</div>
      </div>
      <button class="delete-btn" data-id="${e.id}" title="刪除">✕</button>
    `;
    div.addEventListener('click', (ev) => {
      if (ev.target.classList.contains('delete-btn')) return;
      const code = (codes[e.id] || '').replace(' ','');
      if (code) { navigator.clipboard.writeText(code).then(() => showToast('已複製 ' + e.name)); }
    });
    el.appendChild(div);
  }
  // delete buttons
  el.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      entries = entries.filter(x => x.id !== btn.dataset.id);
      save(entries);
      delete codes[btn.dataset.id];
      render();
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Tick ───────────────────────────────────────────────────────────────────
async function tick() {
  const now = Math.floor(Date.now() / 1000);
  const period = 30;
  const remaining = period - (now % period);
  const frac = remaining / period;
  const circumference = 2 * Math.PI * 18; // ≈ 113.1

  for (const e of entries) {
    const codeEl = document.getElementById('code-' + e.id);
    const arcEl  = document.getElementById('arc-' + e.id);
    if (!codeEl || !arcEl) continue;

    // Refresh code at boundary
    if (!codes[e.id] || now % period === 0) {
      try {
        codes[e.id] = formatCode(await totp(e.secret));
      } catch {
        codes[e.id] = 'ERROR';
      }
    }

    codeEl.textContent = codes[e.id];
    const expiring = remaining <= 5;
    codeEl.className = 'entry-code' + (expiring ? ' expiring' : '');
    arcEl.className  = 'fg' + (expiring ? ' expiring' : '');
    arcEl.style.strokeDashoffset = circumference * (1 - frac);
  }
}

// ── Add entry ──────────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', async () => {
  const name   = document.getElementById('inp-name').value.trim();
  const secret = document.getElementById('inp-secret').value.trim().replace(/\s/g, '');
  if (!name || !secret) { showToast('請填入名稱和 Secret Key'); return; }
  // Validate
  try {
    const code = await totp(secret);
    if (!/^\d{6}$/.test(code)) throw new Error('invalid');
  } catch {
    showToast('❌ Secret Key 格式錯誤'); return;
  }
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  entries.push({ id, name, secret });
  save(entries);
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-secret').value = '';
  render();
  await tick();
});

// Enter key
document.getElementById('inp-secret').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add').click();
});

// ── Init ───────────────────────────────────────────────────────────────────
render();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
