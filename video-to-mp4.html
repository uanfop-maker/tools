<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影片轉 LINE MP4</title>
<script src="./coi-serviceworker.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 60px;
}
h1 { font-size: 1.5rem; margin-bottom: 4px; }
.sub { color: #666; font-size: 0.85rem; margin-bottom: 24px; text-align: center; }

.drop-zone {
  width: 100%; max-width: 560px;
  border: 2px dashed #333;
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #161616;
}
.drop-zone.drag { border-color: #4f8ef7; background: #0d1a2b; }
.drop-zone:hover { border-color: #444; }
.drop-icon { font-size: 2.4rem; margin-bottom: 10px; }
.drop-text { color: #999; font-size: 0.9rem; }
.drop-text strong { color: #ddd; }
input[type=file] { display: none; }

/* Settings */
.settings {
  width: 100%; max-width: 560px;
  background: #161616;
  border-radius: 12px;
  padding: 14px 18px;
  margin-top: 12px;
}
.settings-title { font-size: 0.78rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-row label { font-size: 0.88rem; color: #bbb; }
select {
  background: #222; border: 1px solid #333; color: #e0e0e0;
  border-radius: 6px; padding: 4px 8px; font-size: 0.82rem;
}
.crf-wrap { display: flex; align-items: center; gap: 8px; }
input[type=range] { width: 110px; accent-color: #4f8ef7; }
.crf-val { font-size: 0.82rem; color: #888; width: 62px; }

/* File list */
.file-list {
  width: 100%; max-width: 560px;
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.file-item {
  background: #161616;
  border-radius: 12px;
  padding: 12px 14px;
}
.file-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
.file-name { font-size: 0.88rem; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.file-size { font-size: 0.8rem; color: #666; white-space: nowrap; }
.badge {
  font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; white-space: nowrap;
  font-weight: 600;
}
.badge-pending  { background: #2a2a2a; color: #888; }
.badge-loading  { background: #1a2a3a; color: #4f8ef7; }
.badge-convert  { background: #1a2a1a; color: #4caf50; }
.badge-done     { background: #1a2f1a; color: #6ee17b; }
.badge-error    { background: #2f1a1a; color: #f57c7c; }

.file-bar-wrap { background: #222; border-radius: 4px; height: 4px; overflow: hidden; }
.file-bar { height: 100%; background: linear-gradient(90deg, #4f8ef7, #7bb8ff); border-radius: 4px; width: 0%; transition: width 0.3s; }
.file-note { font-size: 0.78rem; color: #666; margin-top: 5px; }
.file-note.green { color: #5a9; }
.file-note.red   { color: #c66; }

/* Buttons */
.actions { width: 100%; max-width: 560px; margin-top: 14px; display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 13px; border-radius: 12px; border: none;
  font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, background 0.2s;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: #4f8ef7; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #3a7de8; }
.btn-secondary { background: #252525; color: #bbb; }
.btn-secondary:hover:not(:disabled) { background: #2f2f2f; }

.hint {
  width: 100%; max-width: 560px;
  margin-top: 16px;
  font-size: 0.78rem; color: #444; text-align: center; line-height: 1.6;
}
</style>
</head>
<body>

<h1>🎬 影片轉 LINE MP4</h1>
<p class="sub">在瀏覽器本地轉換 · 不上傳 · 支援批次</p>

<div class="drop-zone" id="dropZone">
  <div class="drop-icon">📁</div>
  <div class="drop-text"><strong>點擊選擇</strong>或拖曳影片（可多選）</div>
  <div class="drop-text" style="margin-top:5px;font-size:0.78rem;">MP4 · MOV · AVI · MKV · WebM 等</div>
  <input type="file" id="fileInput" accept="video/*" multiple>
</div>

<div class="settings" id="settings" style="display:none">
  <div class="settings-title">套用至全部檔案</div>
  <div class="setting-row">
    <label>解析度</label>
    <select id="resolution">
      <option value="0">原始（不縮放）</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p（小檔）</option>
      <option value="360">360p（最小）</option>
    </select>
  </div>
  <div class="setting-row">
    <label>畫質（CRF）</label>
    <div class="crf-wrap">
      <input type="range" id="crf" min="18" max="35" value="18">
      <span class="crf-val" id="crfLabel">18（最高）</span>
    </div>
  </div>
  <div class="setting-row">
    <label>音訊</label>
    <select id="audio">
      <option value="copy">原始（複製）</option>
      <option value="192k">192k（高品質）</option>
      <option value="128k">128k（標準）</option>
      <option value="96k">96k（省空間）</option>
    </select>
  </div>
</div>

<div class="file-list" id="fileList"></div>

<div class="actions" id="actions" style="display:none">
  <button class="btn btn-primary" id="btnStart">🔄 開始轉換</button>
  <button class="btn btn-secondary" id="btnClear">清除全部</button>
</div>

<div class="hint" id="hint" style="display:none">
  轉換完成後自動下載 · 若瀏覽器詢問「允許多個下載」請點允許
</div>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const settingsEl = document.getElementById('settings');
const fileListEl = document.getElementById('fileList');
const actionsEl = document.getElementById('actions');
const hintEl = document.getElementById('hint');
const btnStart = document.getElementById('btnStart');
const btnClear = document.getElementById('btnClear');
const crfInput = document.getElementById('crf');
const crfLabel = document.getElementById('crfLabel');

crfInput.addEventListener('input', () => {
  const v = parseInt(crfInput.value);
  const q = v <= 20 ? '最高' : v <= 24 ? '高' : v <= 28 ? '佳' : v <= 32 ? '中' : '低';
  crfLabel.textContent = `${v}（${q}）`;
});

// queue: [{file, status:'pending'|'loading'|'converting'|'done'|'error', pct:0, note:'', outputBlob}]
let queue = [];
let processing = false;
let ffmpegLoaded = false;

const ffmpeg = createFFmpeg({
  corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
  log: true,
});

function fmt(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function addFiles(files) {
  let added = 0;
  for (const f of files) {
    if (f.type.startsWith('video/') || /\.(mp4|mov|avi|mkv|webm|wmv|flv|m4v|ts|mts)$/i.test(f.name)) {
      queue.push({ file: f, status: 'pending', pct: 0, note: '', outputBlob: null });
      added++;
    }
  }
  if (added) render();
}

function render() {
  const hasFiles = queue.length > 0;
  settingsEl.style.display = hasFiles ? 'block' : 'none';
  actionsEl.style.display = hasFiles ? 'flex' : 'none';
  hintEl.style.display = hasFiles ? 'block' : 'none';

  const allDone = queue.length > 0 && queue.every(q => q.status === 'done' || q.status === 'error');
  const anyConverting = queue.some(q => q.status === 'converting' || q.status === 'loading');

  btnStart.disabled = anyConverting || allDone;
  btnStart.textContent = anyConverting ? '⏳ 轉換中...' : '🔄 開始轉換';
  btnClear.disabled = anyConverting;

  fileListEl.innerHTML = queue.map((item, i) => {
    const badgeClass = {
      pending: 'badge-pending', loading: 'badge-loading',
      converting: 'badge-convert', done: 'badge-done', error: 'badge-error'
    }[item.status];
    const badgeText = {
      pending: '待處理', loading: 'FFmpeg 載入中',
      converting: `轉換中 ${item.pct}%`, done: '✅ 完成', error: '❌ 失敗'
    }[item.status];
    const showBar = item.status === 'converting' || item.status === 'loading';
    const noteClass = item.status === 'error' ? 'red' : 'green';
    return `
      <div class="file-item" data-idx="${i}">
        <div class="file-header">
          <span class="file-name" title="${item.file.name}">${item.file.name}</span>
          <span class="file-size">${fmt(item.file.size)}</span>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        ${showBar ? `<div class="file-bar-wrap"><div class="file-bar" style="width:${item.status==='loading'?5:item.pct}%"></div></div>` : ''}
        ${item.note ? `<div class="file-note ${noteClass}">${item.note}</div>` : ''}
      </div>`;
  }).join('');
}

function autoDownload(item) {
  const baseName = item.file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(item.outputBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = baseName + '_mobile.mp4';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 15000);
}

async function processQueue() {
  if (processing) return;
  processing = true;
  btnStart.disabled = true;

  const res = parseInt(document.getElementById('resolution').value);
  const crf = document.getElementById('crf').value;
  const audioBitrate = document.getElementById('audio').value;

  for (let i = 0; i < queue.length; i++) {
    const item = queue[i];
    if (item.status !== 'pending') continue;

    try {
      if (!ffmpegLoaded) {
        item.status = 'loading';
        item.pct = 0;
        render();
        ffmpeg.setProgress(({ ratio }) => {
          item.pct = Math.min(Math.round(ratio * 100), 99);
          render();
        });
        await ffmpeg.load();
        ffmpegLoaded = true;
      } else {
        ffmpeg.setProgress(({ ratio }) => {
          item.pct = Math.min(Math.round(ratio * 100), 99);
          render();
        });
      }

      item.status = 'converting';
      item.pct = 0;
      render();

      const ext = item.file.name.split('.').pop().toLowerCase() || 'mp4';
      const inputName = `input_${i}.${ext}`;
      const outputName = `output_${i}.mp4`;

      ffmpeg.FS('writeFile', inputName, await fetchFile(item.file));

      const args = ['-i', inputName,
        '-c:v', 'libx264', '-preset', 'fast', '-crf', crf,
        '-profile:v', 'main', '-level', '4.0'];

      if (res > 0) {
        const sf = `scale='if(gt(iw,ih),min(${Math.round(res*16/9)},iw),-2)':'if(gt(iw,ih),-2,min(${res},ih))',scale=trunc(iw/2)*2:trunc(ih/2)*2`;
        args.push('-vf', sf);
      }

      if (audioBitrate === 'copy') {
        args.push('-c:a', 'copy');
      } else {
        args.push('-c:a', 'aac', '-b:a', audioBitrate);
      }

      args.push('-movflags', '+faststart', '-y', outputName);

      await ffmpeg.run(...args);

      const data = ffmpeg.FS('readFile', outputName);
      item.outputBlob = new Blob([data.buffer], { type: 'video/mp4' });

      const saved = item.file.size - item.outputBlob.size;
      item.note = `${fmt(item.outputBlob.size)}${saved > 0 ? `，節省 ${fmt(saved)}（${(saved/item.file.size*100).toFixed(0)}%）` : ''}`;
      item.status = 'done';
      item.pct = 100;
      render();

      autoDownload(item);

      try { ffmpeg.FS('unlink', inputName); ffmpeg.FS('unlink', outputName); } catch(_) {}

    } catch (err) {
      item.status = 'error';
      item.note = err.message;
      render();
    }
  }

  processing = false;
  render();
}

btnStart.addEventListener('click', processQueue);

btnClear.addEventListener('click', () => {
  if (processing) return;
  queue = [];
  fileInput.value = '';
  render();
});

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { addFiles(Array.from(e.target.files)); fileInput.value = ''; });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  addFiles(Array.from(e.dataTransfer.files));
});
</script>
</body>
</html>
